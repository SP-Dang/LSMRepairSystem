<!DOCTYPE html>
<html lang="lo"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8"><title>LSM - ສະຖານະການສ້ອມແປງສົດ</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif; background:#1a1a1a; color:#eee; margin:0; padding:20px;}
        .container{max-width:1400px; margin:0 auto;}
        .header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #333; padding-bottom:15px; flex-wrap:wrap;}
        .board{display:flex; gap:20px; overflow-x:auto; padding-bottom:20px;}
        .column{background:#252525; min-width:300px; border-radius:10px; padding:15px; border-top:4px solid #444;}
        .column-reception{border-color:#3498db;}
        .column-repair{border-color:#f1c40f;}
        .column-pdi{border-color:#e67e22;}
        .column-ready{border-color:#27ae60;}
        .job-card{background:#333; padding:15px; border-radius:8px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.3); border-left:4px solid #555; transition:transform 0.2s;}
        .job-card:hover{transform:translateX(5px);}
        .plate{font-size:18px; font-weight:bold; color:#fff; display:block;}
        .mech-name{font-size:12px; color:#f1c40f; margin-top:5px; display:block;}
        .symptoms{font-size:11px; color:#888; margin-top:8px; font-style:italic;}
        .time-stamp{font-size:10px; color:#555; margin-top:5px;}
        .btn-back{text-decoration:none; color:#f1c40f; font-weight:bold; border:1px solid #f1c40f; padding:5px 15px; border-radius:5px;}
        .refresh-btn{background:#27ae60; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer; margin-left:10px;}
        .stats-bar{display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap;}
        .stat-pill{background:#333; padding:8px 16px; border-radius:20px; font-size:13px;}
        .stat-pill span{color:#f1c40f; font-weight:bold;}
        @media (max-width:768px){
            .board{flex-direction:column;}
            .column{min-width:auto;}
        }
    </style>
</head><body>

<div class="container">
    <div class="header">
        <div>
            <h1>📊 ສະຖານະການສ້ອມແປງສົດ</h1>
            <small style="color:#888">ອັບເດດອັດຕະໂນມັດທຸກ 30 ວິນາທີ</small>
        </div>
        <div>
            <button class="refresh-btn" onclick="loadLiveView()">🔄 ຣີເຟຣດຕອນນີ້</button>
            <a href="gm-menu.html" class="btn-back">⬅️ ກັບຄືນແຜງຄວບຄຸມ</a>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-pill">🚗 ລໍຖ້າ: <span id="count-reception">0</span></div>
        <div class="stat-pill">🔧 ກຳລັງສ້ອມແປງ: <span id="count-repair">0</span></div>
        <div class="stat-pill">✅ ກຳລັງກວດສອບ PDI: <span id="count-pdi">0</span></div>
        <div class="stat-pill">🏁 ສຳເລັດຮັບລົດ: <span id="count-completed">0</span></div>
    </div>

    <div class="board">
        <div class="column column-reception">
            <h3 style="color:#3498db">📋 ລໍຖ້າມອບໝາຍ (QUEUED)</h3>
            <div id="col-QUEUED"></div>
        </div>

        <div class="column column-repair">
            <h3 style="color:#f1c40f">🔧 ກຳລັງສ້ອມແປງ (IN REPAIR)</h3>
            <div id="col-IN_REPAIR"></div>
        </div>

        <div class="column column-pdi">
            <h3 style="color:#e67e22">🔍 ກວດສອບ PDI (PDI)</h3>
            <div id="col-PDI"></div>
        </div>

        <div class="column column-ready">
            <h3 style="color:#27ae60">🏁 ສຳເລັດຮັບລົດ (COMPLETED)</h3>
            <div id="col-COMPLETED"></div>
        </div>
    </div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    async function loadLiveView() {
        const { data: jobs, error } = await _s.from('job_cards')
            .select('*')
            .order('created_at', { ascending: false });
        
        if(error) {
            console.error("Error loading jobs:", error);
            return;
        }
        
        // Clear all columns
        document.getElementById('col-QUEUED').innerHTML = "";
        document.getElementById('col-IN_REPAIR').innerHTML = "";
        document.getElementById('col-PDI').innerHTML = "";
        document.getElementById('col-COMPLETED').innerHTML = "";

        if(!jobs || jobs.length === 0) {
            const emptyMsg = "<div style='text-align:center;padding:40px;color:#555'>ບໍ່ມີຂໍ້ມູນວຽກ</div>";
            document.getElementById('col-QUEUED').innerHTML = emptyMsg;
            document.getElementById('col-IN_REPAIR').innerHTML = emptyMsg;
            document.getElementById('col-PDI').innerHTML = emptyMsg;
            document.getElementById('col-COMPLETED').innerHTML = emptyMsg;
            return;
        }

        let counts = { QUEUED: 0, IN_REPAIR: 0, PDI: 0, COMPLETED: 0 };

        jobs.forEach(job => {
            let status = job.current_status;
            if(status === 'FINISHED') status = 'COMPLETED';
            
            const container = document.getElementById('col-' + status);
            if(container) {
                counts[status] = (counts[status] || 0) + 1;
                
                const card = document.createElement('div');
                card.className = 'job-card';
                const dateStr = job.arrival_time ? new Date(job.arrival_time).toLocaleString('lo-LA') : '';
                const coreColor = job.core_type == 1 ? '#3498db' : (job.core_type == 2 ? '#f1c40f' : '#e74c3c');
                
                card.innerHTML = `
                    <span class="plate">🚕 ${job.vehicle_plate}</span>
                    <small style="color:${coreColor}; display:inline-block; margin-top:5px;">ແກນ CORE ${job.core_type}</small>
                    <span class="mech-name">👤 ຊ່າງ: ${job.assigned_mechanic_id || 'ຍັງບໍ່ໄດ້ມອບໝາຍ'}</span>
                    <div class="symptoms">📝 ອາການ: ${job.symptoms || 'ບໍ່ມີ'}</div>
                    <div class="time-stamp">🕐 ເວລາມາ: ${dateStr}</div>
                `;
                container.appendChild(card);
            }
        });
        
        document.getElementById('count-reception').innerText = counts.QUEUED || 0;
        document.getElementById('count-repair').innerText = counts.IN_REPAIR || 0;
        document.getElementById('count-pdi').innerText = counts.PDI || 0;
        document.getElementById('count-completed').innerText = counts.COMPLETED || 0;
    }

    loadLiveView();
    setInterval(loadLiveView, 30000);
</script>
</body></html>
