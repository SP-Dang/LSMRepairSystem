<!DOCTYPE html>
<html lang="en"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8"><title>LSM - LIVE WORKSHOP VIEW</title>
    <style>
        body{font-family:'Segoe UI',sans-serif; background:#1a1a1a; color:#eee; margin:0; padding:20px;}
        .container{max-width:1200px; margin:0 auto;}
        .header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #333; padding-bottom:15px;}
        .board{display:flex; gap:20px; overflow-x:auto; padding-bottom:20px;}
        .column{background:#252525; min-width:300px; border-radius:10px; padding:15px; border-top:4px solid #444;}
        .column-reception{border-color:#3498db;}
        .column-repair{border-color:#f1c40f;}
        .column-pdi{border-color:#e67e22;}
        .column-ready{border-color:#27ae60;}
        .job-card{background:#333; padding:15px; border-radius:8px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.3); border-left:4px solid #555;}
        .plate{font-size:18px; font-weight:bold; color:#fff; display:block;}
        .mech-name{font-size:12px; color:#f1c40f; margin-top:5px; display:block;}
        .symptoms{font-size:11px; color:#888; margin-top:8px; font-style:italic;}
        .btn-back{text-decoration:none; color:#f1c40f; font-weight:bold; border:1px solid #f1c40f; padding:5px 15px; border-radius:5px;}
    </style>
</head><body>

<div class="container">
    <div class="header">
        <h1>📊 Live Workshop View</h1>
        <a href="gm-menu.html" class="btn-back">⬅️ BACK TO GM MENU</a>
    </div>

    <div class="board">
        <div class="column column-reception">
            <h3 style="color:#3498db">WAITING (NEW)</h3>
            <div id="col-RECEPTION"></div>
        </div>

        <div class="column column-repair">
            <h3 style="color:#f1c40f">IN REPAIR</h3>
            <div id="col-IN_REPAIR"></div>
        </div>

        <div class="column column-pdi">
            <h3 style="color:#e67e22">PDI INSPECTION</h3>
            <div id="col-PDI"></div>
        </div>

        <div class="column column-ready">
            <h3 style="color:#27ae60">READY FOR PICKUP</h3>
            <div id="col-COMPLETED"></div>
        </div>
    </div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    async function loadLiveView() {
        console.log("Refreshing Live View...");
        const { data: jobs, error } = await _s.from('job_cards').select('*').order('created_at', { ascending: false });
        
        // 1. Clear all columns
        document.getElementById('col-RECEPTION').innerHTML = "";
        document.getElementById('col-IN_REPAIR').innerHTML = "";
        document.getElementById('col-PDI').innerHTML = "";
        document.getElementById('col-COMPLETED').innerHTML = "";

        if (error) {
            console.error("Supabase Error:", error);
            return;
        }

        if (!jobs || jobs.length === 0) {
            console.log("No jobs found in database.");
            return;
        }

        // 2. Map statuses to columns
        jobs.forEach(job => {
            const rawStatus = (job.current_status || 'UNKNOWN').toUpperCase().trim();
            let targetColId = '';

            // --- THE MAPPING LOGIC ---
            if (rawStatus === 'QUEUED' || rawStatus === 'RECEPTION' || rawStatus === 'WAITING' || rawStatus === 'NEW') {
                targetColId = 'col-RECEPTION';
            } 
            else if (rawStatus === 'IN_REPAIR' || rawStatus === 'REPAIRING' || rawStatus === 'WORKING') {
                targetColId = 'col-IN_REPAIR';
            } 
            else if (rawStatus === 'PDI' || rawStatus === 'INSPECTION') {
                targetColId = 'col-PDI';
            } 
            else if (rawStatus === 'COMPLETED' || rawStatus === 'READY' || rawStatus === 'DONE') {
                targetColId = 'col-COMPLETED';
            } 
            else {
                // Default to first column if status is unknown so you still see the vehicle
                targetColId = 'col-RECEPTION';
            }

            const container = document.getElementById(targetColId);
            if (container) {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <span class="plate">${job.vehicle_plate}</span>
                    <small style="color:#888">${job.core_type || 'Taxi Repair'}</small>
                    <span class="mech-name">👤 Mechanic: ${job.assigned_mechanic_id || 'Not Assigned'}</span>
                    <div class="symptoms">📝 ${job.symptoms || 'No symptoms noted'}</div>
                `;
                container.appendChild(card);
            }
        });
    }

    // Initial load
    loadLiveView();
    // Refresh every 30 seconds
    setInterval(loadLiveView, 30000);
</script>
