<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM REPAIR SYSTEM - LOGIN</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #222; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; border-top: 4px solid #ff4500; }
        h1 { color: #ff4500; margin-bottom: 25px; font-size: 24px; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-size: 20px; text-align: center; letter-spacing: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e63e00; }
        .loading { display: none; color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>LSM SYSTEM</h1>
    <input type="password" id="pin-input" placeholder="ENTER PIN" maxlength="4" inputmode="numeric">
    <button id="login-btn" onclick="login()">SIGN IN</button>
    <div id="loader" class="loading">Verifying PIN with Database...</div>
</div>

<script>
    // YOUR SUPABASE CONFIG
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    async function login() {
        const pin = document.getElementById('pin-input').value;
        const btn = document.getElementById('login-btn');
        const loader = document.getElementById('loader');

        if (!pin) return alert("Please enter your 4-digit PIN");

        // UI Feedback
        btn.disabled = true;
        btn.innerText = "CHECKING...";
        loader.style.display = "block";

        try {
            // 1. Search for the staff member by PIN
            const { data, error } = await _s.from('staff')
                .select('name, role, pin')
                .eq('pin', pin)
                .maybeSingle();

            if (error) throw error;

            if (data) {
                // 2. Save Session Data
                localStorage.setItem('lsm_user_name', data.name);
                localStorage.setItem('lsm_user_role', data.role);

                // 3. Clean and Route
                const role = data.role ? data.role.toUpperCase() : "NONE";
                
                if (role === 'MANAGER') {
                    window.location.href = 'manager-dashboard.html';
                } else if (role === 'RECEPTIONIST') {
                    window.location.href = 'reception-checkin.html';
                } else if (role === 'MECHANIC') {
                    window.location.href = 'mechanic-view.html';
                } else if (role === 'PDI') {
                    window.location.href = 'pdi-release.html';
                } else if (role === 'WAREHOUSE') {
                    window.location.href = 'warehouse-parts.html';
                } else {
                    alert("ACCESS DENIED: Role '" + role + "' not recognized.");
                    resetUI();
                }
            } else {
                alert("❌ INVALID PIN: Access Denied.");
                resetUI();
            }
        } catch (err) {
            console.error("Login Error:", err);
            alert("SYSTEM ERROR: " + err.message);
            resetUI();
        }
    }

    function resetUI() {
        const btn = document.getElementById('login-btn');
        const loader = document.getElementById('loader');
        btn.disabled = false;
        btn.innerText = "SIGN IN";
        loader.style.display = "none";
        document.getElementById('pin-input').value = "";
    }

    // Allow pressing "Enter" key to login
    document.getElementById('pin-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
