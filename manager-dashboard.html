<!DOCTYPE html>
<html lang="lo"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM - ມອບໝາຍວຽກໃຫ້ຊ່າງ</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif;background:#1a1a1a;color:#eee;margin:0;padding:20px}
        .container{max-width:900px;margin:0 auto}
        .header{background:#222;padding:20px;border-radius:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #f1c40f;flex-wrap:wrap;}
        .header h2{margin:0;color:#f1c40f;font-size:18px}
        .job-card{background:#282828;border-radius:10px;padding:20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-left:5px solid #f1c40f}
        .info b{color:#fff;font-size:18px}
        .symptoms{font-size:13px;color:#aaa;margin-top:8px;background:#111;padding:8px;border-radius:5px}
        .controls{display:flex;gap:10px;flex-wrap:wrap}
        select, button{padding:10px;border-radius:6px;border:none;cursor:pointer;font-weight:bold}
        .assign-btn{background:#f1c40f;color:#1a1a1a}
        .assign-btn:hover{background:#e67e22;color:#fff}
        .back-btn{background:#3498db;color:white;text-decoration:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:bold}
        .back-btn:hover{background:#2980b9}
        .core-tag{padding:3px 8px;border-radius:4px;font-size:10px;text-transform:uppercase;margin-bottom:5px;display:inline-block}
        .c1{background:#3498db} .c2{background:#f1c40f;color:#000} .c3{background:#e74c3c}
        .empty-state{text-align:center;padding:50px;color:#555}
        .stats-info{background:#333;padding:10px 15px;border-radius:8px;margin-bottom:15px;font-size:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
        @media (max-width:600px){
            .job-card{flex-direction:column;align-items:flex-start}
            .controls{width:100%}
            select,.assign-btn{width:100%}
        }
    </style>
</head><body>

<div class="container">
    <div class="header">
        <div>
            <h2>✅ ມອບໝາຍວຽກໃຫ້ຊ່າງສ້ອມແປງ</h2>
            <small style="color:#888; font-size:11px">ເລືອກຊ່າງ ແລະ ກົດມອບໝາຍ</small>
        </div>
        <div style="display:flex; gap:10px; align-items:center">
            <a href="reception-checkin.html" class="back-btn">⬅️ ກັບຄືນຮັບລົດ</a>
            <button onclick="loadQueue()" style="background:#444;color:white">🔄 ຣີເຟຣດ</button>
            <button class="back-btn" onclick="logout()" style="background:#e74c3c">ອອກຈາກລະບົບ</button>
        </div>
    </div>

    <div class="stats-info">
        <span>📋 ລົດທີ່ລໍຖ້າມອບໝາຍ: <strong id="queue-count">0</strong></span>
        <span>🔧 ຊ່າງທີ່ມີຢູ່: <strong id="mechanic-count">0</strong></span>
        <span>👷 ຊ່າງຫວ່າງ: <strong id="available-mechanics">0</strong></span>
    </div>

    <div id="incoming-list">ກຳລັງໂຫຼດຂໍ້ມູນ...</div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    let activeMechanics = []; 

    async function loadMechanics() {
        const { data, error } = await _s.from('staff')
            .select('name')
            .eq('role', 'MECHANIC')
            .order('name');
        
        if(error || !data || data.length === 0) {
            activeMechanics = ["Somchai", "Keo", "Noi", "Boun", "Phet", "Somsak"];
        } else {
            activeMechanics = data.map(m => m.name);
        }
        document.getElementById('mechanic-count').innerText = activeMechanics.length;
        return activeMechanics;
    }

    async function loadQueue() {
        const list = document.getElementById('incoming-list');
        const { data, error } = await _s.from('job_cards')
            .select('*')
            .eq('current_status', 'QUEUED')
            .order('id', { ascending: true });

        if (error) {
            list.innerHTML = "<div class='empty-state'>ຜິດພາດໃນການໂຫຼດຂໍ້ມູນ</div>";
            return;
        }

        document.getElementById('queue-count').innerText = data ? data.length : 0;

        // Calculate mechanic workloads
        const mechanicWorkload = {};
        let availableCount = 0;
        
        for(const mech of activeMechanics) {
            const { count } = await _s.from('job_cards')
                .select('*', { count: 'exact', head: true })
                .eq('assigned_mechanic_id', mech)
                .eq('current_status', 'IN_REPAIR');
            mechanicWorkload[mech] = count || 0;
            if(mechanicWorkload[mech] < 3) availableCount++;
        }
        document.getElementById('available-mechanics').innerText = availableCount;

        if(!data || data.length === 0) {
            list.innerHTML = "<div class='empty-state'>🎉 ບໍ່ມີລົດທີ່ລໍຖ້າມອບໝາຍ</div>";
            return;
        }

        list.innerHTML = "";
        for(const job of data) {
            const div = document.createElement('div');
            div.className = 'job-card';
            
            let optionsHtml = '<option value="">-- ເລືອກຊ່າງ --</option>';
            for(const mech of activeMechanics) {
                const workload = mechanicWorkload[mech] || 0;
                const isFull = workload >= 3;
                const warning = isFull ? '⚠️ (ເຕັມ)' : ` (${workload}/3)`;
                optionsHtml += `<option value="${mech}" ${isFull ? 'disabled style="color:#e74c3c"' : ''}>${mech}${warning}</option>`;
            }
            
            div.innerHTML = `
                <div class="info">
                    <span class="core-tag c${job.core_type}">ແກນ ${job.core_type}</span><br>
                    <b>🚕 ${job.vehicle_plate}</b>
                    <div class="symptoms">📝 ອາການ: ${job.symptoms || 'ບໍ່ມີ'}</div>
                    <small style="color:#888">ມາເມື່ອ: ${new Date(job.arrival_time).toLocaleString('lo-LA')}</small>
                </div>
                <div class="controls">
                    <select id="mech-${job.id}" style="background:#444;color:white;min-width:180px">
                        ${optionsHtml}
                    </select>
                    <button class="assign-btn" onclick="assignJob(${job.id})">✅ ມອບໝາຍວຽກ</button>
                </div>
            `;
            list.appendChild(div);
        }
    }

    async function assignJob(jobId) {
        const mechName = document.getElementById(`mech-${jobId}`).value;
        if(!mechName) return alert("ກະລຸນາເລືອກຊ່າງກ່ອນ!");
        
        // Double check workload
        const { count } = await _s.from('job_cards')
            .select('*', { count: 'exact', head: true })
            .eq('assigned_mechanic_id', mechName)
            .eq('current_status', 'IN_REPAIR');
        
        if(count >= 3) {
            alert(`⚠️ ຊ່າງ ${mechName} ກຳລັງສ້ອມແປງ ${count} ຄັນແລ້ວ (ສູງສຸດ 3 ຄັນ), ກະລຸນາເລືອກຊ່າງອື່ນ`);
            // Reload to refresh the dropdown
            loadQueue();
            return;
        }

        const { error } = await _s.from('job_cards')
            .update({ assigned_mechanic_id: mechName, current_status: 'IN_REPAIR' })
            .eq('id', jobId);

        if(!error) {
            alert(`✅ ມອບໝາຍວຽກໃຫ້ ${mechName} ສຳເລັດ!`);
            loadQueue();
        } else {
            alert("ຜິດພາດ: " + error.message);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    window.onload = async () => {
        await loadMechanics();
        await loadQueue();
    };
    setInterval(loadQueue, 20000); 
</script>
</body></html>
