<!DOCTYPE html>
<html lang="en"><head><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LSM MANAGER - COMMAND CENTER</title><style>body{font-family:'Segoe UI',sans-serif;background:#1a1a1a;color:#eee;margin:0;padding:20px} .container{max-width:900px;margin:0 auto} h1{color:#ff4500;border-bottom:2px solid #333;padding-bottom:10px;display:flex;justify-content:space-between;align-items:center} .job-card{background:#222;border-radius:10px;padding:20px;margin-bottom:15px;border-left:5px solid #ff4500;display:flex;justify-content:space-between;align-items:center} .info b{color:#fff;font-size:18px} .symptoms{font-size:13px;color:#888;margin-top:5px;background:#111;padding:5px;border-radius:4px} .controls{display:flex;gap:10px} select, button{padding:10px;border-radius:5px;border:none;cursor:pointer;font-weight:bold} .assign-btn{background:#27ae60;color:white} .core-tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:bold;text-transform:uppercase;margin-bottom:5px;display:inline-block} .c1{background:#3498db} .c2{background:#f1c40f;color:#000} .c3{background:#e74c3c}</style></head><body>

<div class="container">
    <h1><span>👨‍✈️ Manager Dashboard</span> <button onclick="loadQueue()" style="background:#444;color:white;font-size:12px">REFRESH</button></h1>
    <p>Incoming Vehicles (Waiting for Assignment):</p>
    <div id="incoming-list">Checking the garage...</div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDI3NDQ3M30.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    const mechanics = ["Somchai", "Keo", "Noi", "Boun", "Phet", "Somsak"];

    async function loadQueue() {
        const list = document.getElementById('incoming-list');
        if (!list) return; // Safety check

        const { data, error } = await _s.from('job_cards')
            .select('id, vehicle_plate, core_type, symptoms, current_status')
            .eq('current_status', 'QUEUED')
            .order('id', { ascending: true });

        if (error) {
            list.innerHTML = `<div style="color:red">Error: ${error.message}</div>`;
            return;
        }

        list.innerHTML = "";

        if(data && data.length === 0) {
            list.innerHTML = "<div style='text-align:center;padding:40px;color:#666'>No vehicles waiting. Garage is clear! 🛠️</div>";
            return;
        }

        data.forEach(job => {
            const div = document.createElement('div');
            div.className = 'job-card';
            div.innerHTML = `
                <div class="info">
                    <span class="core-tag c${job.core_type}">CORE ${job.core_type}</span><br>
                    <b>${job.vehicle_plate}</b><br>
                    <div class="symptoms">🔧 Issues: ${job.symptoms}</div>
                </div>
                <div class="controls">
                    <select id="mech-${job.id}">
                        <option value="">Pick Mechanic</option>
                        ${mechanics.map(m => `<option value="${m}">${m}</option>`).join('')}
                    </select>
                    <button class="assign-btn" onclick="assignJob(${job.id})">ASSIGN</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // Run on start
    window.onload = loadQueue;
    setInterval(loadQueue, 15000);

    async function assignJob(jobId) {
        const mechName = document.getElementById(`mech-${jobId}`).value;
        if(!mechName) return alert("Please select a mechanic first!");

        const { error } = await _s.from('job_cards')
            .update({ assigned_mechanic_id: mechName, current_status: 'IN_REPAIR' })
            .eq('id', jobId);

        if(!error) {
            alert("Job assigned!");
            loadQueue();
        }
    }
</script>
</body></html>
