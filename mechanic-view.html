<!DOCTYPE html>
<html lang="lo">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM - ໜ້າວຽກຊ່າງສ້ອມແປງ</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif;background:#1e1e1e;color:#eee;margin:0;padding:15px}
        .header{background:#333;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #27ae60;flex-wrap:wrap;gap:10px}
        .job-card{background:#2d2d2d;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.3);border-left:6px solid #27ae60}
        .plate-no{font-size:24px;font-weight:bold;color:#fff;display:block;margin-bottom:5px}
        .symptoms-box{background:#1a1a1a;padding:10px;border-radius:6px;font-size:13px;color:#bbb;margin:10px 0}
        
        .status-container { margin-top: 15px; background: #111; border-radius: 8px; padding: 10px; font-size: 12px; }
        .status-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #222; }
        .status-row:last-child { border-bottom: none; }
        .tag { padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .tag-pending { background: #f1c40f; color: #000; }
        .tag-issued { background: #27ae60; color: #fff; }
        .tag-rejected { background: #e74c3c; color: #fff; }
        .tag-warning { background: #e67e22; color: #fff; }

        .btn-scan{width:100%;padding:12px;background:#f1c40f;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:5px}
        .btn-scan:hover{background:#e67e22}
        .basket-container { margin-top: 15px; background: #1a1a1a; border: 1px dashed #f1c40f; border-radius: 8px; overflow: hidden; display: none; }
        .basket-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; font-size: 13px; }
        .btn-remove { background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; }
        .btn-send-all { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; }
        .btn-done{width:100%;padding:15px;background:#27ae60;color:white;border:none;border-radius:8px;font-weight:bold;margin-top:15px;cursor:pointer}
        .btn-done:hover{background:#219a52}
        
        #scanner-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        #reader { width: 300px; background: white; border-radius: 10px; overflow: hidden; }
        .close-scan { margin-top: 20px; padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .logout-btn{background:transparent;border:1px solid #27ae60;color:#27ae60;padding:5px 10px;border-radius:5px;font-size:12px;text-decoration:none;cursor:pointer}
        .logout-btn:hover{background:#27ae60;color:#fff}
        .stock-info{font-size:11px;color:#f1c40f;margin-top:5px;display:block}
        .empty-state{text-align:center;padding:50px;color:#666}
        .labor-fee-input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:1px solid #444;background:#1a1a1a;color:white;font-size:14px;box-sizing:border-box}
        
        @media (max-width:600px){
            .plate-no{font-size:18px}
            .job-card{padding:15px}
        }
    </style>
</head>
<body>

<div id="scanner-container">
    <div id="reader"></div>
    <button class="close-scan" onclick="stopScanner()">❌ ຍົກເລີກການສະແກນ</button>
</div>

<div class="header">
    <div>
        <span style="font-size:10px;color:#888;display:block">ຊ່າງປະຈຳວຽນ</span>
        <b id="mech-name" style="font-size:18px">...</b>
    </div>
    <a href="#" class="logout-btn" onclick="logout()">ອອກຈາກລະບົບ</a>
</div>

<h2 style="font-size:14px;color:#888;margin-left:5px">🔧 ວຽກທີ່ກຳລັງສ້ອມແປງ</h2>
<div id="my-jobs">ກຳລັງໂຫຼດຂໍ້ມູນ...</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    const currentMech = localStorage.getItem('lsm_user_name');
    if(!currentMech) window.location.href = 'index.html';
    document.getElementById('mech-name').innerText = currentMech;

    let html5QrCode;
    let activeJobId = null;
    let partBasketMap = {};

    async function loadMyJobs() {
        const { data: jobs } = await _s.from('job_cards')
            .select('*').eq('assigned_mechanic_id', currentMech)
            .eq('current_status', 'IN_REPAIR').order('id', { ascending: true });

        const list = document.getElementById('my-jobs');
        if(!jobs || jobs.length === 0) {
            list.innerHTML = "<div class='empty-state'>ບໍ່ມີວຽກທີ່ມອບໝາຍໃຫ້ທ່ານ 🛠️</div>";
            return;
        }

        const { data: parts } = await _s.from('part_requests')
            .select('*').in('job_id', jobs.map(j => j.id));

        list.innerHTML = "";
        for(const job of jobs) {
            const jobParts = parts ? parts.filter(p => p.job_id === job.id) : [];
            
            let statusHtml = "";
            if (jobParts.length > 0) {
                statusHtml = `<div class="status-container"><b>📦 ສະຖານະການຂໍອາໄຫຼ່:</b>`;
                jobParts.forEach(p => {
                    let tagClass = 'tag-pending';
                    let tagText = 'ລໍຖ້າ';
                    if(p.status === 'ISSUED') { tagClass = 'tag-issued'; tagText = 'ເບີກແລ້ວ'; }
                    else if(p.status === 'REJECTED') { tagClass = 'tag-rejected'; tagText = 'ປະຕິເສດ'; }
                    
                    statusHtml += `
                        <div class="status-row">
                            <span>${p.quantity}x ${p.part_name}</span>
                            <span class="tag ${tagClass}">${tagText}</span>
                        </div>`;
                });
                statusHtml += `</div>`;
            }

            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `
                <span style="font-size:10px;background:#444;padding:3px 8px;border-radius:4px">ເລກວຽກ: ${job.id} | ແກນ C${job.core_type}</span>
                <span class="plate-no">🚕 ${job.vehicle_plate}</span>
                <div class="symptoms-box"><b>📝 ອາການ:</b><br>${job.symptoms || 'ບໍ່ມີ'}</div>
                
                <button class="btn-scan" onclick="startScanner(${job.id})">📷 ສະແກນບາໂຄດອາໄຫຼ່</button>
                
                ${statusHtml}

                <div id="basket-display-${job.id}" class="basket-container"></div>
                
                <div id="labor-fee-${job.id}" style="margin-top:10px">
                    <input type="number" id="labor-input-${job.id}" class="labor-fee-input" placeholder="ຄ່າແຮງງານ (USD)" step="0.01" value="${job.labor_fee || '0'}">
                </div>
                
                <button class="btn-done" onclick="finishRepair(${job.id})">✅ ສ້ອມແປງສຳເລັດ (ສົ່ງ PDI)</button>
            `;
            list.appendChild(card);

            if (partBasketMap[job.id]) {
                renderBasket(job.id);
            }
        }
    }

    function startScanner(jobId) {
        activeJobId = jobId;
        document.getElementById('scanner-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            stopScanner();
            addToBasket(text);
        });
    }

    function stopScanner() {
        if(html5QrCode) html5QrCode.stop().then(() => {
            document.getElementById('scanner-container').style.display = 'none';
        });
    }

    async function checkStockAvailability(partId, requestedQty) {
        const { data } = await _s.from('inventory')
            .select('stock_quantity, part_name')
            .eq('part_id', partId)
            .single();
        
        if(data && data.stock_quantity < requestedQty) {
            return { available: false, currentStock: data.stock_quantity, name: data.part_name };
        }
        return { available: true, currentStock: data?.stock_quantity || 0, name: data?.part_name || partId };
    }

    async function addToBasket(scannedId) {
        const cleanId = scannedId.toString().replace(/[^a-zA-Z0-9]/g, '').trim();
        
        const { data: partInfo } = await _s.from('inventory')
            .select('part_name, stock_quantity')
            .ilike('part_id', `%${cleanId}%`)
            .maybeSingle();
        
        const currentStock = partInfo ? partInfo.stock_quantity : 0;
        const name = partInfo ? partInfo.part_name : "ບໍ່ຮູ້ຈັກ (" + cleanId + ")";
        
        const qty = prompt(`📦 ພົບ: ${name}\nເຫຼືອໃນຄັງ: ${currentStock} ຊິ້ນ\nຕ້ອງການຈັກຊິ້ນ?`, "1");

        if(qty && !isNaN(qty) && parseInt(qty) > 0) {
            const requestedQty = parseInt(qty);
            
            if(requestedQty > currentStock) {
                alert(`⚠️ ສິນຄ້າບໍ່ພຽງພໍ! ເຫຼືອພຽງ ${currentStock} ຊິ້ນ`);
                return;
            }
            
            if(!partBasketMap[activeJobId]) partBasketMap[activeJobId] = [];
            partBasketMap[activeJobId].push({ id: cleanId, name: name, qty: requestedQty, currentStock: currentStock });
            renderBasket(activeJobId);
        }
    }

    function renderBasket(jobId) {
        const div = document.getElementById('basket-display-' + jobId);
        if(!div) return;
        
        const basket = partBasketMap[jobId] || [];
        if(basket.length === 0) { 
            div.style.display = "none"; 
            return; 
        }

        div.style.display = "block";
        let html = `<div style="padding:10px; font-size:12px; color:#f1c40f; font-weight:bold; border-bottom:1px solid #333">🛒 ລາຍການທີ່ຈະຂໍ:</div>`;
        
        basket.forEach((item, i) => {
            html += `<div class="basket-item">
                <span><b>${item.qty}x</b> ${item.name}</span>
                <button class="btn-remove" onclick="removeFromBasket(${jobId}, ${i})">❌ ຍົກເລີກ</button>
            </div>`;
        });
        
        html += `<button class="btn-send-all" onclick="sendBatchRequest(${jobId})">🚀 ສົ່ງຄຳຂໍໄປຄັງເກັບ</button>`;
        div.innerHTML = html;
    }

    function removeFromBasket(jobId, index) { 
        partBasketMap[jobId].splice(index, 1); 
        if(partBasketMap[jobId].length === 0) {
            delete partBasketMap[jobId];
        }
        renderBasket(jobId); 
    }

    async function sendBatchRequest(jobId) {
        const basket = partBasketMap[jobId];
        if(!basket || basket.length === 0) return;

        // Double check stock before sending
        for(const item of basket) {
            const { data } = await _s.from('inventory')
                .select('stock_quantity')
                .eq('part_id', item.id)
                .single();
            
            if(data && data.stock_quantity < item.qty) {
                alert(`⚠️ ${item.name} ເຫຼືອພຽງ ${data.stock_quantity} ຊິ້ນ! ກະລຸນາແກ້ໄຂຈຳນວນ`);
                return;
            }
        }

        const inserts = basket.map(i => ({ 
            job_id: jobId, 
            part_id: i.id, 
            part_name: i.name, 
            quantity: i.qty, 
            requested_by: currentMech, 
            status: 'PENDING',
            request_time: new Date()
        }));

        const { error } = await _s.from('part_requests').insert(inserts);
        if(!error) { 
            alert(`✅ ສົ່ງຄຳຂໍ ${basket.length} ລາຍການໄປຄັງເກັບສຳເລັດ!`); 
            delete partBasketMap[jobId];
            loadMyJobs(); 
        } else {
            alert("❌ ຜິດພາດ: " + error.message);
        }
    }

    async function finishRepair(jobId) {
        const basket = partBasketMap[jobId];
        if(basket && basket.length > 0) {
            alert("⚠️ ກະລຸນາສົ່ງ ຫຼື ຍົກເລີກລາຍການອາໄຫຼ່ໃນຕະກ້າກ່ອນ!");
            return;
        }
        
        const laborInput = document.getElementById(`labor-input-${jobId}`);
        const laborFee = laborInput ? parseFloat(laborInput.value) || 0 : 0;
        
        if(!confirm(`ຢືນຢັນສົ່ງວຽກໄປ PDI?\nຄ່າແຮງງານ: $${laborFee.toFixed(2)}`)) return;
        
        const { data: pendingReqs } = await _s.from('part_requests')
            .select('id')
            .eq('job_id', jobId)
            .eq('status', 'PENDING');
        
        if(pendingReqs && pendingReqs.length > 0) {
            alert(`⚠️ ຍັງມີ ${pendingReqs.length} ລາຍການທີ່ລໍຖ້າອາໄຫຼ່ຈາກຄັງເກັບ!`);
            return;
        }
        
        const { error } = await _s.from('job_cards')
            .update({ current_status: 'PDI', labor_fee: laborFee })
            .eq('id', jobId);
        
        if(!error) {
            alert(`✅ ສົ່ງໄປ PDI ສຳເລັດ! (ຄ່າແຮງງານ: $${laborFee.toFixed(2)})`);
            loadMyJobs();
        } else {
            alert("❌ ຜິດພາດ: " + error.message);
        }
    }

    function logout() { 
        localStorage.clear(); 
        window.location.href = 'index.html'; 
    }

    loadMyJobs();
    setInterval(loadMyJobs, 20000); 
</script>
</body>
</html>
