<!DOCTYPE html>
<html lang="lo"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM - ຮັບລົດເຂົ້າຊ່ອມ (RECEPTION)</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif;background:#f0f2f5;margin:0;padding:20px} 
        .card{max-width:600px;margin:0 auto;background:#fff;padding:30px;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.1)} 
        h2{color:#1a1a1a;margin-top:0;border-bottom:3px solid #ff4500;padding-bottom:10px;display:flex;justify-content:space-between;flex-wrap:wrap} 
        .section-label{font-size:12px;font-weight:900;color:#ff4500;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px} 
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px} 
        .form-group{margin-bottom:12px} 
        label{display:block;margin-bottom:5px;font-weight:bold;font-size:13px;color:#444} 
        input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;font-size:14px} 
        .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#f9f9f9;padding:15px;border-radius:10px} 
        .check-item{display:flex;align-items:center;font-size:13px;cursor:pointer} 
        .check-item input{width:auto;margin-right:10px} 
        .core-selection{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap} 
        .core-btn{flex:1;padding:12px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-size:12px;font-weight:bold;transition:0.3s} 
        .core-btn.active{background:#ff4500;color:#fff;border-color:#ff4500} 
        
        .button-group{display:flex;gap:15px;margin-top:20px}
        .button-group button{flex:1;padding:18px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.2s}
        .btn-create{background:#1a1a1a;color:#fff}
        .btn-create:hover{background:#333}
        .btn-assign{background:#f1c40f;color:#1a1a1a}
        .btn-assign:hover{background:#e67e22;color:#fff}
        
        .success-msg{display:none;background:#d4edda;color:#155724;padding:15px;border-radius:8px;text-align:center;margin-top:15px;font-weight:bold}
        .logout-btn{font-size:14px;color:#e74c3c;cursor:pointer;text-decoration:none;border:1px solid #e74c3c;background:none;padding:4px 10px;border-radius:5px;font-weight:bold;transition:0.2s}
        .logout-btn:hover{background:#e74c3c;color:#fff}
        #search-status{font-size:10px;font-weight:bold;margin-top:4px;display:block}
        
        @media (max-width:500px){
            .grid{grid-template-columns:1fr}
            .check-grid{grid-template-columns:1fr}
            .button-group{flex-direction:column}
        }
    </style>
</head><body>

<div class="card">
    <h2>
        <span>🆕 ຮັບລົດເຂົ້າຊ່ອມ</span> 
        <div>
            <div id="user-display" style="font-size:12px;color:#888;font-weight:normal">ກຳລັງໂຫຼດ...</div>
            <button class="logout-btn" onclick="logout()">ອອກຈາກລະບົບ</button>
        </div>
    </h2>
    
    <div class="section-label">🚗 ຂໍ້ມູນລົດ ແລະ ເຈົ້າຂອງ</div>
    <div class="grid">
        <div class="form-group">
            <label>ທະບຽນລົດ</label>
            <input type="text" id="plate" placeholder="ຕົວຢ່າງ: 1234 VT" onblur="lookupVehicle()" style="text-transform:uppercase">
            <span id="search-status"></span>
        </div>
        <div class="form-group"><label>ລຸ້ນລົດ</label><input type="text" id="model" placeholder="E5, E7, M5"></div>
    </div>
    <div class="grid">
        <div class="form-group"><label>ເລກຖັງ/ເຄື່ອງ (VIN)</label><input type="text" id="vin" placeholder="ເລກຕົວຖັງ"></div>
        <div class="form-group"><label>ຊື່ເຈົ້າຂອງ</label><input type="text" id="owner" placeholder="ຊື່ ແລະ ນາມສະກຸນ"></div>
    </div>
    <div class="form-group"><label>ເບີໂທລະສັບ</label><input type="text" id="phone" placeholder="020xxxxxxxx"></div>

    <div class="section-label">📝 ອາການທີ່ຕ້ອງການສ້ອມແປງ (6 ຈຸດ)</div>
    <div class="check-grid">
        <label class="check-item"><input type="checkbox" class="symptom" value="Suspension"> 1. ລະບົບຊ້ວງລ່າງ (Suspension)</label>
        <label class="check-item"><input type="checkbox" class="symptom" value="Brakes"> 2. ລະບົບເບຣກ (Brakes)</label>
        <label class="check-item"><input type="checkbox" class="symptom" value="Wheels"> 3. ລໍ້/ຢາງ (Wheels/Tires)</label>
        <label class="check-item"><input type="checkbox" class="symptom" value="PowerTrain"> 4. ລະບົບສົ່ງກຳລັງ (Power Train)</label>
        <label class="check-item"><input type="checkbox" class="symptom" value="Electrical"> 5. ໄຟຟ້າ/ສະວິດ (Electrical)</label>
        <label class="check-item"><input type="checkbox" class="symptom" value="Battery"> 6. ແບັດເຕີຣີ (Battery)</label>
    </div>

    <div class="section-label">🎯 ເລືອກແກນການສ້ອມແປງ</div>
    <div class="core-selection">
        <div class="core-btn" id="core-1" onclick="setCore(1, this)">ແກນ 1: ທົ່ວໄປ (IN/OUT)</div>
        <div class="core-btn active" id="core-2" onclick="setCore(2, this)">ແກນ 2: ເລັກນ້ອຍ (MINOR)</div>
        <div class="core-btn" id="core-3" onclick="setCore(3, this)">ແກນ 3: ໃຫຍ່ (GMS)</div>
    </div>

    <div class="button-group">
        <button class="btn-create" onclick="submitJob(false)">📋 ສ້າງໃບສັ່ງຊ່ອມຢ່າງດຽວ</button>
        <button class="btn-assign" onclick="submitJob(true)">✅ ສ້າງໃບສັ່ງຊ່ອມ + ໄປມອບວຽກ</button>
    </div>
    <div id="msg" class="success-msg">✅ ສ້າງໃບສັ່ງຊ່ອມ #<span id="jobNo"></span> ສຳເລັດ!</div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co";
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    const currentStaff = localStorage.getItem('lsm_user_name');
    if(!currentStaff) {
        window.location.href = 'index.html';
    } else {
        document.getElementById('user-display').innerText = "ພະນັກງານ: " + currentStaff;
    }

    let selectedCore = 2;

    function setCore(val, el) {
        selectedCore = val;
        document.querySelectorAll('.core-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function lookupVehicle() {
        const plate = document.getElementById('plate').value.trim().toUpperCase();
        const status = document.getElementById('search-status');
        
        if (plate.length < 3) return;

        status.innerText = "🔍 ກຳລັງຊອກຫາຂໍ້ມູນເກົ່າ...";
        status.style.color = "#888";

        const { data, error } = await _s.from('vehicles')
            .select('*')
            .eq('plate_no', plate)
            .maybeSingle();

        if (data) {
            document.getElementById('vin').value = data.vin_no || "";
            document.getElementById('model').value = data.model_type || "";
            document.getElementById('owner').value = data.owner_name || "";
            document.getElementById('phone').value = data.owner_phone || "";
            
            status.innerText = "✅ ພົບຂໍ້ມູນ ແລະ ຕື່ມອັດຕະໂນມັດແລ້ວ.";
            status.style.color = "#27ae60";
            
            document.querySelectorAll('.grid input').forEach(i => {
                if(i.value) i.style.background = "#e8f5e9";
            });
        } else {
            status.innerText = "🆕 ລົດຄັນໃໝ່ ຍັງບໍ່ເຄີຍມາຊ່ອມ.";
            status.style.color = "#e67e22";
        }
    }

    async function submitJob(goToAssignPage) {
        const plate = document.getElementById('plate').value.toUpperCase();
        const model = document.getElementById('model').value;
        const vin = document.getElementById('vin').value;
        const owner = document.getElementById('owner').value;
        const phone = document.getElementById('phone').value;
        const btn = goToAssignPage ? document.querySelector('.btn-assign') : document.querySelector('.btn-create');
        
        const symptoms = Array.from(document.querySelectorAll('.symptom:checked'))
                             .map(cb => cb.value).join(', ');

        if(!plate) return alert("ກະລຸນາໃສ່ທະບຽນລົດ!");

        btn.disabled = true;
        btn.innerText = "ກຳລັງດຳເນີນການ...";

        await _s.from('vehicles').upsert({ 
            plate_no: plate, 
            owner_name: owner, 
            owner_phone: phone, 
            model_type: model, 
            vin_no: vin 
        });

        const { data, error } = await _s.from('job_cards').insert([{
            vehicle_plate: plate,
            core_type: selectedCore,
            symptoms: symptoms || "ກວດສອບທົ່ວໄປ",
            current_status: 'QUEUED',
            created_by: currentStaff,
            arrival_time: new Date()
        }]).select();

        if (error) {
            alert("ຜິດພາດ: " + error.message);
            btn.disabled = false;
            btn.innerText = goToAssignPage ? "ສ້າງ + ໄປມອບວຽກ" : "ສ້າງໃບສັ່ງຊ່ອມ";
        } else {
            const jobId = data[0].id;
            document.getElementById('jobNo').innerText = jobId;
            document.getElementById('msg').style.display = 'block';
            
            if(goToAssignPage) {
                // Show success message then redirect to assign page
                setTimeout(() => {
                    window.location.href = 'manager-dashboard.html';
                }, 1500);
            } else {
                // Just reset form
                setTimeout(() => {
                    document.getElementById('plate').value = "";
                    document.getElementById('model').value = "";
                    document.getElementById('vin').value = "";
                    document.getElementById('owner').value = "";
                    document.getElementById('phone').value = "";
                    document.querySelectorAll('.symptom:checked').forEach(cb => cb.checked = false);
                    document.getElementById('msg').style.display = 'none';
                    btn.disabled = false;
                    btn.innerText = "ສ້າງໃບສັ່ງຊ່ອມ";
                }, 2000);
            }
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body></html>
