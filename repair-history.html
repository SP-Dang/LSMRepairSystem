<!DOCTYPE html>
<html lang="en"><head><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LSM - REPAIR HISTORY</title><style>
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;margin:0;padding:20px}
    .container{max-width:1200px;margin:0 auto}
    .search-panel{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.05);margin-bottom:20px;display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}
    .filter-group{display:flex;flex-direction:column;gap:5px}
    label{font-size:11px;font-weight:bold;color:#666;text-transform:uppercase}
    input{padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
    .btn-search{padding:10px 25px;background:#1a1a1a;color:white;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
    .history-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
    .history-table th{background:#f8f9fa;padding:15px;text-align:left;border-bottom:2px solid #eee;font-size:13px;color:#444}
    .history-table td{padding:15px;border-bottom:1px solid #eee;font-size:14px;color:#333}
    .status-badge{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:bold;background:#e1f5fe;color:#01579b}
    .core-tag{font-size:10px;padding:2px 5px;border-radius:3px;margin-right:5px;color:white}
    .btn-print{background:#3498db;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:11px}
    .btn-print:hover{background:#2980b9}
</style></head><body>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h1>📜 Repair History Search</h1>
        <div style="display: flex; gap: 10px;">
            <a href="gm-live-view.html" style="text-decoration:none;color:#3498db;font-weight:bold;border:1px solid #3498db;padding:5px 15px;border-radius:6px;font-size:14px">
                ⬅️ Back to Live View
            </a>
            <button onclick="logout()" style="background:none; border:1px solid #e74c3c; color:#e74c3c; font-weight:bold; padding:5px 15px; border-radius:6px; cursor:pointer; font-size:14px;">
                Logout
            </button>
        </div>
    </div>

    <div class="search-panel">
        <div class="filter-group">
            <label>Search Plate Number</label>
            <input type="text" id="search-plate" placeholder="e.g. 1234 VT" style="text-transform:uppercase;width:150px">
        </div>
        <div class="filter-group">
            <label>From Date</label>
            <input type="date" id="date-from">
        </div>
        <div class="filter-group">
            <label>To Date</label>
            <input type="date" id="date-to">
        </div>
        <button class="btn-search" onclick="fetchHistory()">🔍 SEARCH HISTORY</button>
    </div>

    <table class="history-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Vehicle Plate</th>
                <th>Core</th>
                <th>Mechanic</th>
                <th>PDI By</th>
                <th>Symptoms</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="history-body">
            <tr><td colspan="8" style="text-align:center;padding:50px;color:#888">Enter a plate or select dates to begin...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    window.onload = () => {
        const today = new Date();
        const lastMonth = new Date();
        lastMonth.setDate(today.getDate() - 30);
        document.getElementById('date-to').value = today.toISOString().split('T')[0];
        document.getElementById('date-from').value = lastMonth.toISOString().split('T')[0];
        fetchHistory();
    };

    async function fetchHistory() {
        const plate = document.getElementById('search-plate').value.toUpperCase();
        const from = document.getElementById('date-from').value;
        const to = document.getElementById('date-to').value;
        const tbody = document.getElementById('history-body');

        tbody.innerHTML = "<tr><td colspan='8' style='text-align:center'>Searching records...</td></tr>";

        let query = _s.from('job_cards').select('*').order('arrival_time', { ascending: false });

        if (plate) query = query.ilike('vehicle_plate', `%${plate}%`);
        if (from) query = query.gte('arrival_time', `${from}T00:00:00`);
        if (to) query = query.lte('arrival_time', `${to}T23:59:59`);

        const { data, error } = await query.limit(100);

        if (error) {
            tbody.innerHTML = `<tr><td colspan='8' style='color:red'>Error: ${error.message}</td></tr>`;
            return;
        }

        if (data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='8' style='text-align:center'>No matching records found.</td></tr>";
            return;
        }

        tbody.innerHTML = "";
        data.forEach(job => {
            const dateStr = new Date(job.arrival_time).toLocaleDateString('en-GB');
            const row = `
                <tr>
                    <td>${dateStr}</td>
                    <td style="font-weight:bold">${job.vehicle_plate}</td>
                    <td><span class="core-tag" style="background:${job.core_type==1?'#3498db':job.core_type==2?'#f1c40f':'#e74c3c'}">C${job.core_type}</span></td>
                    <td>${job.assigned_mechanic_id || '-'}</td>
                    <td>${job.pdi_by || '-'}</td>
                    <td style="font-size:12px;color:#666;max-width:200px">${job.symptoms}</td>
                    <td><span class="status-badge">${job.current_status}</span></td>
                    <td><button class="btn-print" onclick='printJob("${job.id}")'>🖨️ Print</button></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    async function printJob(id) {
        // 1. Fetch Job Details
        const { data: job, error: jobErr } = await _s.from('job_cards').select('*').eq('id', id).single();
        
        // 2. Fetch Issued Parts for this job
        const { data: parts, error: partsErr } = await _s.from('part_requests')
            .select('part_name, quantity, status')
            .eq('job_id', id)
            .eq('status', 'ISSUED'); // Only show parts actually given to the mechanic

        if (jobErr || !job) return alert("Could not fetch job details for printing.");

        const printWin = window.open('', '_blank');
        const now = new Date().toLocaleString('en-GB');

        // Create the Parts List HTML
        let partsHTML = "<tr><td colspan='2' style='text-align:center; color:#888;'>No parts issued for this job.</td></tr>";
        if (parts && parts.length > 0) {
            partsHTML = parts.map(p => `
                <tr>
                    <td style="padding: 5px 0; border-bottom: 1px dashed #eee;">${p.part_name}</td>
                    <td style="padding: 5px 0; border-bottom: 1px dashed #eee; text-align:right;">x${p.quantity}</td>
                </tr>
            `).join('');
        }

        printWin.document.write(`
            <html>
            <head>
                <title>LSM Job Card - ${job.vehicle_plate}</title>
                <style>
                    @page { margin: 10mm; } /* Helps hide browser's about:blank header in some browsers */
                    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; color: #000; position: relative; min-height: 95vh; }
                    .header-title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 15px; color: #ff4500; text-transform: uppercase; letter-spacing: 2px; }
                    .meta-info { font-size: 13px; margin-bottom: 5px; color: #333; }
                    hr { border: 0; border-top: 2px solid #000; margin: 15px 0; }
                    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
                    .data-label { font-weight: bold; text-transform: uppercase; font-size: 11px; color: #666; margin-bottom: 2px; }
                    .data-value { font-size: 15px; font-weight: bold; }
                    
                    /* Parts Table Style */
                    .parts-section { margin-top: 20px; }
                    .parts-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                    .parts-table th { text-align: left; font-size: 11px; text-transform: uppercase; color: #666; border-bottom: 1px solid #000; padding-bottom: 5px; }
                    
                    .footer-sig { margin-top: 60px; display: flex; justify-content: space-between; }
                    .sig-line { border-top: 1px solid #000; width: 220px; text-align: center; padding-top: 8px; font-weight: bold; font-size: 13px; }
                    
                    .powered-by { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; font-size: 10px; color: #999; font-style: italic; }
                </style>
            </head>
            <body>
                <div class="header-title">LAO SMART MOBILITY</div>
                
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <div class="meta-info"><strong>Job Card No:</strong> #${job.id}</div>
                        <div class="meta-info"><strong>Generated on:</strong> ${now}</div>
                    </div>
                    <div style="text-align: right; font-size: 12px; font-weight: bold; border: 2px solid #000; padding: 5px 10px;">
                        STATUS: ${job.current_status}
                    </div>
                </div>
                
                <hr>
                
                <div class="data-grid">
                    <div class="data-item"><div class="data-label">Vehicle Plate</div><div class="data-value">${job.vehicle_plate}</div></div>
                    <div class="data-item"><div class="data-label">Repair Category</div><div class="data-value">Core ${job.core_type}</div></div>
                    <div class="data-item"><div class="data-label">Primary Mechanic</div><div class="data-value">${job.assigned_mechanic_id || '---'}</div></div>
                    <div class="data-item"><div class="data-label">PDI Verified By</div><div class="data-value">${job.pdi_by || '---'}</div></div>
                </div>

                <div class="parts-section">
                    <div class="data-label">Spare Parts Issued</div>
                    <table class="parts-table">
                        <thead>
                            <tr><th>Part Name</th><th style="text-align:right;">Qty</th></tr>
                        </thead>
                        <tbody>${partsHTML}</tbody>
                    </table>
                </div>

                <div style="margin-top:20px;">
                    <div class="data-label">Mechanic Observations / Symptoms</div>
                    <div style="font-size: 14px; border: 1px solid #eee; padding: 10px; min-height: 50px;">${job.symptoms || 'General service performed.'}</div>
                </div>

                <hr>

                <div class="footer-sig">
                    <div class="sig-line">Prepared by</div>
                    <div class="sig-line">General Manager</div>
                </div>

                <div class="powered-by">Powered by somphone.dang@gmail.com</div>

                <script>
                    window.onload = function() { 
                        window.print(); 
                        // Note: Some browsers block self-closing windows, 
                        // so we wait 500ms before attempting to close.
                        setTimeout(() => { window.close(); }, 500); 
                    }
                <\/script>
            </body>
            </html>
        `);
        printWin.document.close();
    }
    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body></html>
