<!DOCTYPE html>
<html lang="lo"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM - ປະຫວັດການສ້ອມແປງ</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif;background:#f0f2f5;margin:0;padding:20px}
        .container{max-width:1300px;margin:0 auto}
        .search-panel{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.05);margin-bottom:20px;display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}
        .filter-group{display:flex;flex-direction:column;gap:5px}
        label{font-size:11px;font-weight:bold;color:#666;text-transform:uppercase}
        input, select{padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
        .btn-search{padding:10px 25px;background:#1a1a1a;color:white;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
        .btn-search:hover{background:#333}
        .history-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow-x:auto;display:block;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .history-table th{background:#f8f9fa;padding:15px;text-align:left;border-bottom:2px solid #eee;font-size:13px;color:#444}
        .history-table td{padding:15px;border-bottom:1px solid #eee;font-size:14px;color:#333}
        .status-badge{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:bold;background:#e1f5fe;color:#01579b}
        .status-completed{background:#d4edda;color:#155724}
        .core-tag{font-size:10px;padding:2px 5px;border-radius:3px;margin-right:5px;color:white}
        .btn-print{background:#3498db;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:11px}
        .btn-print:hover{background:#2980b9}
        .btn-view{background:#27ae60;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:11px;margin-left:5px}
        .btn-view:hover{background:#219a52}
        .pagination{display:flex;justify-content:center;gap:10px;margin-top:20px}
        .page-btn{padding:8px 15px;background:white;border:1px solid #ddd;border-radius:5px;cursor:pointer}
        .page-btn.active{background:#1a1a1a;color:white;border-color:#1a1a1a}
        .summary-stats{background:#fff;padding:15px;border-radius:12px;margin-bottom:20px;display:flex;gap:20px;flex-wrap:wrap}
        .summary-item{flex:1;text-align:center;padding:10px;background:#f8f9fa;border-radius:8px}
        .summary-item .label{font-size:11px;color:#888}
        .summary-item .value{font-size:20px;font-weight:bold;color:#2c3e50}
        @media (max-width:768px){
            .history-table th,.history-table td{padding:10px;font-size:12px}
            .btn-print,.btn-view{font-size:9px;padding:4px 8px}
        }
    </style>
</head><body>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <h1>📜 ປະຫວັດການສ້ອມແປງ</h1>
        <div style="display: flex; gap: 10px;">
            <a href="gm-live-view.html" style="text-decoration:none;color:#3498db;font-weight:bold;border:1px solid #3498db;padding:5px 15px;border-radius:6px;font-size:14px">
                ⬅️ ກັບຄືນສະຖານະສົດ
            </a>
            <a href="manager-dashboard.html" style="text-decoration:none;color:#27ae60;font-weight:bold;border:1px solid #27ae60;padding:5px 15px;border-radius:6px;font-size:14px">
                🔧 ແຜງຄວບຄຸມ
            </a>
            <button onclick="logout()" style="background:none; border:1px solid #e74c3c; color:#e74c3c; font-weight:bold; padding:5px 15px; border-radius:6px; cursor:pointer; font-size:14px;">
                ອອກຈາກລະບົບ
            </button>
        </div>
    </div>

    <div class="summary-stats">
        <div class="summary-item">
            <div class="label">ວຽກທັງໝົດ</div>
            <div class="value" id="total-jobs">0</div>
        </div>
        <div class="summary-item">
            <div class="label">ວຽກທີ່ສຳເລັດ</div>
            <div class="value" id="total-completed">0</div>
        </div>
        <div class="summary-item">
            <div class="label">ລາຍຮັບລວມ</div>
            <div class="value" id="total-revenue">$0</div>
        </div>
    </div>

    <div class="search-panel">
        <div class="filter-group">
            <label>ຄົ້ນຫາທະບຽນລົດ</label>
            <input type="text" id="search-plate" placeholder="ຕົວຢ່າງ: 1234 VT" style="text-transform:uppercase;width:150px">
        </div>
        <div class="filter-group">
            <label>ວັນທີເລີ່ມ</label>
            <input type="date" id="date-from">
        </div>
        <div class="filter-group">
            <label>ວັນທີສິ້ນສຸດ</label>
            <input type="date" id="date-to">
        </div>
        <div class="filter-group">
            <label>ສະຖານະ</label>
            <select id="status-filter">
                <option value="all">ທັງໝົດ</option>
                <option value="COMPLETED">ສຳເລັດ</option>
                <option value="FINISHED">ສຳເລັດ (ແບບເກົ່າ)</option>
                <option value="IN_REPAIR">ກຳລັງສ້ອມແປງ</option>
                <option value="PDI">ກຳລັງກວດສອບ</option>
                <option value="QUEUED">ລໍຖ້າ</option>
            </select>
        </div>
        <button class="btn-search" onclick="fetchHistory(1)">🔍 ຄົ້ນຫາ</button>
        <button class="btn-search" onclick="exportToCSV()" style="background:#27ae60">📎 ສົ່ງອອກ CSV</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="history-table">
            <thead>
                <tr>
                    <th>ວັນທີ</th>
                    <th>ທະບຽນລົດ</th>
                    <th>ແກນ</th>
                    <th>ຊ່າງ</th>
                    <th>PDI ໂດຍ</th>
                    <th>ອາການ</th>
                    <th>ຄ່າແຮງງານ</th>
                    <th>ສະຖານະ</th>
                    <th>ຈັດການ</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="9" style="text-align:center;padding:50px;color:#888">ໃສ່ທະບຽນລົດ ຫຼື ເລືອກວັນທີເພື່ອເລີ່ມ...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    let currentPage = 1;
    let totalPages = 1;
    const rowsPerPage = 20;

    window.onload = () => {
        const today = new Date();
        const lastMonth = new Date();
        lastMonth.setDate(today.getDate() - 30);
        document.getElementById('date-to').value = today.toISOString().split('T')[0];
        document.getElementById('date-from').value = lastMonth.toISOString().split('T')[0];
        fetchHistory(1);
    };

    async function fetchHistory(page = 1) {
        currentPage = page;
        const plate = document.getElementById('search-plate').value.toUpperCase();
        const from = document.getElementById('date-from').value;
        const to = document.getElementById('date-to').value;
        const status = document.getElementById('status-filter').value;
        const tbody = document.getElementById('history-body');

        tbody.innerHTML = "<tr><td colspan='9' style='text-align:center'>ກຳລັງຄົ້ນຫາ...</td></tr>";

        let query = _s.from('job_cards').select('*', { count: 'exact' });

        if (plate) query = query.ilike('vehicle_plate', `%${plate}%`);
        if (from) query = query.gte('arrival_time', `${from}T00:00:00`);
        if (to) query = query.lte('arrival_time', `${to}T23:59:59`);
        if (status !== 'all') query = query.eq('current_status', status);

        const { data, error, count } = await query
            .order('arrival_time', { ascending: false })
            .range((page - 1) * rowsPerPage, page * rowsPerPage - 1);

        if (error) {
            tbody.innerHTML = `<tr><td colspan='9' style='color:red'>ຜິດພາດ: ${error.message}</td></tr>`;
            return;
        }

        totalPages = Math.ceil((count || 0) / rowsPerPage);
        updatePagination();

        if (!data || data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='9' style='text-align:center'>ບໍ່ພົບຂໍ້ມູນທີ່ຕ້ອງການ</td></tr>";
            updateSummary([]);
            return;
        }

        updateSummary(data);
        renderTable(data);
    }

    function updateSummary(jobs) {
        const total = jobs.length;
        const completed = jobs.filter(j => j.current_status === 'COMPLETED' || j.current_status === 'FINISHED').length;
        const revenue = jobs.filter(j => j.current_status === 'COMPLETED')
            .reduce((sum, j) => sum + (parseFloat(j.labor_fee) || 0), 0);
        
        document.getElementById('total-jobs').innerText = total;
        document.getElementById('total-completed').innerText = completed;
        document.getElementById('total-revenue').innerText = `$${revenue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }

    function renderTable(jobs) {
        const tbody = document.getElementById('history-body');
        tbody.innerHTML = "";

        jobs.forEach(job => {
            const dateStr = new Date(job.arrival_time).toLocaleDateString('lo-LA');
            const coreColors = {1: '#3498db', 2: '#f1c40f', 3: '#e74c3c'};
            const statusClass = (job.current_status === 'COMPLETED' || job.current_status === 'FINISHED') ? 'status-completed' : '';
            const laborFee = parseFloat(job.labor_fee || 0).toFixed(2);
            
            const row = `
                <tr>
                    <td>${dateStr}</td>
                    <td style="font-weight:bold">🚕 ${job.vehicle_plate}</td>
                    <td><span class="core-tag" style="background:${coreColors[job.core_type] || '#888'}">ແກນ C${job.core_type}</span></td>
                    <td>${job.assigned_mechanic_id || '-'}</td>
                    <td>${job.pdi_by || '-'}</td>
                    <td style="font-size:12px;color:#666;max-width:200px">${(job.symptoms || '-').substring(0, 50)}${(job.symptoms || '').length > 50 ? '...' : ''}</td>
                    <td style="color:#27ae60;font-weight:bold">$${laborFee}</td>
                    <td><span class="status-badge ${statusClass}">${job.current_status}</span></td>
                    <td>
                        <button class="btn-print" onclick='printJob("${job.id}")'>🖨️ ພິມ</button>
                        <button class="btn-view" onclick='viewJobDetails("${job.id}")'>👁️ ເບິ່ງ</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    function updatePagination() {
        const paginationDiv = document.getElementById('pagination');
        paginationDiv.innerHTML = '';
        
        if(totalPages <= 1) return;
        
        for(let i = 1; i <= Math.min(totalPages, 10); i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.onclick = () => fetchHistory(i);
            paginationDiv.appendChild(btn);
        }
        
        if(totalPages > 10) {
            const dots = document.createElement('span');
            dots.innerText = '...';
            dots.style.padding = '8px';
            paginationDiv.appendChild(dots);
            
            const lastBtn = document.createElement('button');
            lastBtn.innerText = totalPages;
            lastBtn.className = `page-btn ${totalPages === currentPage ? 'active' : ''}`;
            lastBtn.onclick = () => fetchHistory(totalPages);
            paginationDiv.appendChild(lastBtn);
        }
    }

    async function printJob(jobId) {
        const { data: job, error: jobErr } = await _s.from('job_cards')
            .select('*')
            .eq('id', jobId)
            .single();

        if (!job || jobErr) return alert("ບໍ່ພົບຂໍ້ມູນວຽກ");

        const { data: parts, error: partsErr } = await _s.from('part_requests')
            .select(`
                part_name,
                quantity,
                part_id,
                inventory (unit_price)
            `)
            .eq('job_id', jobId)
            .eq('status', 'ISSUED');

        let partsHtml = "";
        let partsSubtotal = 0;
        const laborFee = parseFloat(job.labor_fee || 0);

        partsHtml = `
            <table style="width:100%; border-collapse: collapse; margin-top: 15px; font-size: 12px;">
                <thead>
                    <tr style="background: #f2f2f2; border-bottom: 2px solid #333;">
                        <th style="text-align:left; padding: 8px;">ລາຍການ / ບໍລິການ</th>
                        <th style="text-align:center; padding: 8px;">ຈຳນວນ</th>
                        <th style="text-align:right; padding: 8px;">ລາຄາ</th>
                        <th style="text-align:right; padding: 8px;">ລວມ</th>
                    </tr>
                </thead>
                <tbody>`;

        if (parts && parts.length > 0) {
            parts.forEach(p => {
                const price = p.inventory ? p.inventory.unit_price : 0;
                const lineTotal = p.quantity * price;
                partsSubtotal += lineTotal;

                partsHtml += `
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 8px;">${p.part_name} (${p.part_id})</td>
                        <td style="text-align:center; padding: 8px;">${p.quantity}</td>
                        <td style="text-align:right; padding: 8px;">$${price.toFixed(2)}</td>
                        <td style="text-align:right; padding: 8px;">$${lineTotal.toFixed(2)}</td>
                    </tr>`;
            });
        } else {
            partsHtml += `<tr><td colspan="4" style="padding:8px; color:#888; text-align:center;">ບໍ່ມີການໃຊ້ອາໄຫຼ່</td></tr>`;
        }

        partsHtml += `
            <tr style="background: #fafafa; font-style: italic; border-top: 2px solid #eee;">
                <td colspan="3" style="padding: 8px; text-align:right;">ຄ່າແຮງງານ:</td>
                <td style="text-align:right; padding: 8px;">$${laborFee.toFixed(2)}</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3" style="text-align:right; padding: 10px; font-weight:bold; font-size:16px;">ລວມທັງໝົດ:</td>
                <td style="text-align:right; padding: 10px; font-weight:bold; font-size:16px; border-top: 2px solid #333;">
                    $${(partsSubtotal + laborFee).toFixed(2)}
                </td>
            </tr>
        </tfoot>
        </table>`;

        const printWin = window.open('', '', 'width=800,height=900');
        printWin.document.write(`
            <html>
            <head>
                <title>ໃບຮັບຮອງ - ວຽກ #${job.id}</title>
                <style>
                    body { font-family: 'Segoe UI', 'Phetsarath OT', sans-serif; padding: 40px; color: #333; }
                    .header { text-align: center; border-bottom: 2px solid #ff4500; padding-bottom: 10px; margin-bottom: 20px; }
                    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
                    .box { border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
                    .label { font-size: 10px; color: #777; text-transform: uppercase; display: block; }
                    .value { font-weight: bold; font-size: 14px; }
                    @media print {
                        body { margin: 0; padding: 20px; }
                        button { display: none; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1 style="margin:0; color:#ff4500;">LAO SMART MOBILITY</h1>
                    <p style="margin:5px 0; font-size:12px;">ໃບຮັບຮອງການສ້ອມແປງ / ໃບສັ່ງຊ່ອມ</p>
                </div>
                <div class="info-grid">
                    <div class="box">
                        <span class="label">ເລກທີ່ວຽກ</span><span class="value">#${job.id}</span><br><br>
                        <span class="label">ທະບຽນລົດ</span><span class="value">${job.vehicle_plate}</span>
                    </div>
                    <div class="box">
                        <span class="label">ວັນທີ</span><span class="value">${new Date(job.arrival_time).toLocaleDateString('lo-LA')}</span><br><br>
                        <span class="label">ຊ່າງຜູ້ສ້ອມແປງ</span><span class="value">${job.assigned_mechanic_id || 'N/A'}</span>
                    </div>
                </div>
                <div class="box" style="margin-bottom:20px;">
                    <span class="label">ອາການ ແລະ ວຽກທີ່ເຮັດ</span>
                    <p class="value" style="font-size:12px;">${job.symptoms || 'ບໍ່ມີຂໍ້ມູນ'}</p>
                </div>
                <h3 style="border-bottom: 1px solid #333; padding-bottom: 5px;">ລາຍລະອຽດຄ່າໃຊ້ຈ່າຍ</h3>
                ${partsHtml}
                <div style="margin-top: 50px; display: flex; justify-content: space-between;">
                    <div style="text-align:center; width: 200px; border-top: 1px solid #333; padding-top: 5px; font-size: 12px;">ລາຍເຊັນລູກຄ້າ</div>
                    <div style="text-align:center; width: 200px; border-top: 1px solid #333; padding-top: 5px; font-size: 12px;">ຜູ້ຈັດການ / ຜູ້ອະນຸມັດ</div>
                </div>
                <div style="text-align:center; margin-top: 30px; font-size: 10px; color:#888;">
                    ຂອບໃຈທີ່ໃຊ້ບໍລິການ LSM | ສອບຖາມເພີ່ມເຕີມ: 020 12345678
                </div>
            </body>
            </html>
        `);
        printWin.document.close();
        printWin.focus();
        setTimeout(() => { printWin.print(); }, 500);
    }

    async function viewJobDetails(jobId) {
        const { data: job } = await _s.from('job_cards').select('*').eq('id', jobId).single();
        if(!job) return alert("ບໍ່ພົບຂໍ້ມູນ");
        
        const { data: parts } = await _s.from('part_requests')
            .select('part_name, quantity, status, requested_by, issued_by')
            .eq('job_id', jobId);
        
        let partsList = 'ບໍ່ມີອາໄຫຼ່';
        if(parts && parts.length > 0) {
            partsList = parts.map(p => `${p.quantity}x ${p.part_name} (${p.status})`).join('\n');
        }
        
        alert(`📋 ລາຍລະອຽດວຽກ #${job.id}\n
🚗 ທະບຽນ: ${job.vehicle_plate}
🔧 ແກນ: C${job.core_type}
👤 ຊ່າງ: ${job.assigned_mechanic_id || 'ຍັງບໍ່ໄດ້ມອບໝາຍ'}
📝 ອາການ: ${job.symptoms || '-'}
💰 ຄ່າແຮງງານ: $${(job.labor_fee || 0).toFixed(2)}
🔩 ອາໄຫຼ່ທີ່ໃຊ້:\n${partsList}
📅 ວັນທີມາ: ${new Date(job.arrival_time).toLocaleString('lo-LA')}
${job.departure_time ? `🏁 ວັນທີສົ່ງມອບ: ${new Date(job.departure_time).toLocaleString('lo-LA')}` : ''}`);
    }

    function exportToCSV() {
        const plate = document.getElementById('search-plate').value.toUpperCase();
        const from = document.getElementById('date-from').value;
        const to = document.getElementById('date-to').value;
        const status = document.getElementById('status-filter').value;
        
        let query = _s.from('job_cards').select('*');
        if (plate) query = query.ilike('vehicle_plate', `%${plate}%`);
        if (from) query = query.gte('arrival_time', `${from}T00:00:00`);
        if (to) query = query.lte('arrival_time', `${to}T23:59:59`);
        if (status !== 'all') query = query.eq('current_status', status);
        
        query.order('arrival_time', { ascending: false }).then(({ data }) => {
            if(!data || data.length === 0) {
                alert("ບໍ່ມີຂໍ້ມູນທີ່ຈະສົ່ງອອກ");
                return;
            }
            
            let csv = "ID,ທະບຽນລົດ,ແກນ,ຊ່າງ,PDI,ອາການ,ຄ່າແຮງງານ,ສະຖານະ,ວັນທີມາ\n";
            data.forEach(job => {
                csv += `"${job.id}","${job.vehicle_plate}","C${job.core_type}","${job.assigned_mechanic_id || '-'}","${job.pdi_by || '-'}","${(job.symptoms || '').replace(/"/g, '""')}","${job.labor_fee || 0}","${job.current_status}","${job.arrival_time}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `repair_history_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body></html>
