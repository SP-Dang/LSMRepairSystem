<!DOCTYPE html>
<html lang="en"><head><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LSM - PERFORMANCE REPORT</title><style>
    body{font-family:'Segoe UI',sans-serif;background:#121212;color:#eee;margin:0;padding:20px}
    .container{max-width:1000px;margin:0 auto}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:20px;margin-bottom:30px}
    .stat-card{background:#1e1e1e;padding:20px;border-radius:12px;text-align:center;border-bottom:4px solid #3498db}
    .stat-card h3{margin:0;font-size:12px;color:#888;text-transform:uppercase}
    .stat-card .value{font-size:32px;font-weight:bold;margin:10px 0;color:#fff}
    .report-table{width:100%;border-collapse:collapse;background:#1e1e1e;border-radius:12px;overflow:hidden;margin-top:20px}
    .report-table th{background:#252525;padding:15px;text-align:left;color:#3498db;font-size:13px}
    .report-table td{padding:15px;border-top:1px solid #333;font-size:14px}
    .rank-1{color:#f1c40f;font-weight:bold} /* Gold for top performer */
    .btn-nav{padding:10px 20px;background:#333;color:white;text-decoration:none;border-radius:8px;font-size:14px}
</style></head><body>

<div class="container">
    <div class="header">
        <h1>📊 Daily Performance Report</h1>
        <div style="display:flex; gap:10px">
            <a href="manager-dashboard.html" class="btn-nav">⬅️ BACK TO GARAGE</a>
            <button onclick="generateReport()" style="background:#27ae60;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer">🔄 REFRESH</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color:#27ae60">
            <h3>Completed Today</h3>
            <div class="value" id="total-finished">0</div>
        </div>
        <div class="stat-card" style="border-color:#f1c40f">
            <h3>Currently in Repair</h3>
            <div class="value" id="total-repair">0</div>
        </div>
        <div class="stat-card" style="border-color:#e74c3c">
            <h3>Waiting in Queue</h3>
            <div class="value" id="total-queued">0</div>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
        <div>
            <h2>👨‍🔧 Mechanic Leaderboard</h2>
            <table class="report-table">
                <thead><tr><th>Mechanic Name</th><th>Jobs Done</th></tr></thead>
                <tbody id="mechanic-stats"></tbody>
            </table>
        </div>
        <div>
            <h2>🔍 PDI Accuracy (Today)</h2>
            <table class="report-table">
                <thead><tr><th>Inspector</th><th>Approved</th></tr></thead>
                <tbody id="pdi-stats"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    async function generateReport() {
        // Get today's date in Bangkok time for filtering
        const today = new Date().toISOString().split('T')[0];

        // 1. Fetch all jobs from today
        const { data, error } = await _s.from('job_cards')
            .select('current_status, assigned_mechanic_id, pdi_by')
            .gte('arrival_time', today);

        if(error) return console.error(error);

        // 2. Calculate Top-Level Totals
        const finished = data.filter(j => j.current_status === 'FINISHED').length;
        const repair = data.filter(j => j.current_status === 'IN_REPAIR').length;
        const queued = data.filter(j => j.current_status === 'QUEUED').length;

        document.getElementById('total-finished').innerText = finished;
        document.getElementById('total-repair').innerText = repair;
        document.getElementById('total-queued').innerText = queued;

        // 3. Mechanic Performance (Counting finished jobs)
        const mechCounts = {};
        data.filter(j => j.current_status === 'FINISHED').forEach(j => {
            mechCounts[j.assigned_mechanic_id] = (mechCounts[j.assigned_mechanic_id] || 0) + 1;
        });

        const mechTable = document.getElementById('mechanic-stats');
        mechTable.innerHTML = Object.entries(mechCounts)
            .sort((a,b) => b[1] - a[1])
            .map(([name, count], index) => `
                <tr class="${index === 0 ? 'rank-1' : ''}">
                    <td>${index === 0 ? '🏆 ' : ''}${name || 'Unassigned'}</td>
                    <td>${count}</td>
                </tr>
            `).join('') || "<tr><td colspan='2'>No jobs finished yet today.</td></tr>";

        // 4. PDI Performance
        const pdiCounts = {};
        data.filter(j => j.current_status === 'FINISHED' && j.pdi_by).forEach(j => {
            pdiCounts[j.pdi_by] = (pdiCounts[j.pdi_by] || 0) + 1;
        });

        const pdiTable = document.getElementById('pdi-stats');
        pdiTable.innerHTML = Object.entries(pdiCounts)
            .sort((a,b) => b[1] - a[1])
            .map(([name, count]) => `<tr><td>${name}</td><td>${count}</td></tr>`)
            .join('') || "<tr><td colspan='2'>No inspections done yet.</td></tr>";
    }

    // Refresh report every 2 minutes
    generateReport();
    setInterval(generateReport, 120000);
</script>
</body></html>
