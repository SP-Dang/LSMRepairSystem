<!DOCTYPE html>
<html lang="lo"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM - ຈັດການພະນັກງານ</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif; background:#f4f7f6; margin:0; padding:20px;}
        .container{max-width:900px; margin:0 auto;}
        .header-box{background:#2980b9; color:white; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
        .staff-table{width:100%; background:white; border-radius:12px; overflow-x:auto; box-shadow:0 4px 15px rgba(0,0,0,0.05); border-collapse:collapse;}
        th{background:#f8f9fa; color:#7f8c8d; padding:15px; text-align:left; font-size:12px; text-transform:uppercase;}
        td{padding:15px; border-bottom:1px solid #eee; font-size:14px; color:#2c3e50;}
        .role-badge{padding:4px 10px; border-radius:20px; font-size:11px; font-weight:bold; color:white; display:inline-block;}
        .role-GM{background:#1a2a3a;}
        .role-MANAGER{background:#2980b9;}
        .role-MECHANIC{background:#f1c40f; color:#000;}
        .role-PDI{background:#e67e22;}
        .role-RECEPTIONIST{background:#3498db;}
        .role-WAREHOUSE{background:#9b59b6;}
        
        .btn-action{padding:6px 12px; border-radius:5px; border:1px solid #ddd; background:white; cursor:pointer; font-size:12px;}
        .btn-action:hover{background:#f8f9fa; border-color:#2980b9; color:#2980b9;}
        .btn-add{background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;}
        
        #staff-modal{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:100;}
        .modal-content{background:white; padding:30px; border-radius:15px; width:350px; max-width:90%;}
        .modal-content input, .modal-content select{width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;}
        @media (max-width:600px){
            th,td{font-size:12px;padding:10px}
            .btn-action{padding:4px 8px;font-size:10px}
        }
    </style>
</head><body>

<div class="container">
    <div style="margin-bottom:15px;">
        <a href="gm-menu.html" style="text-decoration:none; color:#2980b9; font-weight:bold;">⬅️ ກັບຄືນແຜງຄວບຄຸມ GM</a>
    </div>

    <div class="header-box">
        <div>
            <h1 style="margin:0; font-size:24px;">👥 ຈັດການພະນັກງານ</h1>
            <p style="margin:5px 0 0; opacity:0.8;">ຄຸ້ມຄອງສິດເຂົ້າໃຊ້ຂອງພະນັກງານທຸກຄົນ</p>
        </div>
        <button class="btn-add" onclick="openStaffModal()">+ ເພີ່ມພະນັກງານໃໝ່</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="staff-table">
            <thead>
                <tr>
                    <th>ຊື່ພະນັກງານ</th>
                    <th>ບົດບາດ</th>
                    <th>ລະຫັດ PIN</th>
                    <th>ຈັດການ</th>
                </tr>
            </thead>
            <tbody id="staff-list-body">
                </tbody>
        </table>
    </div>
</div>

<div id="staff-modal">
    <div class="modal-content">
        <h3 id="modal-title">ລົງທະບຽນພະນັກງານໃໝ່</h3>
        <input type="text" id="staff-name" placeholder="ຊື່ ແລະ ນາມສະກຸນ">
        <select id="staff-role">
            <option value="GM">ຜູ້ຈັດການໃຫຍ່ (GM)</option>
            <option value="MANAGER">ຜູ້ຈັດການ (MANAGER)</option>
            <option value="RECEPTIONIST">ພະນັກງານຕ້ອນຮັບ (RECEPTIONIST)</option>
            <option value="MECHANIC">ຊ່າງ (MECHANIC)</option>
            <option value="PDI">ພະນັກງານ PDI</option>
            <option value="WAREHOUSE">ພະນັກງານຄັງເກັບ (WAREHOUSE)</option>
        </select>
        <input type="password" id="staff-pin" placeholder="ລະຫັດ 4 ຕົວເລກ" maxlength="4">
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="saveStaff()" style="flex:2; background:#2980b9; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">💾 ບັນທຶກ</button>
            <button onclick="closeStaffModal()" style="flex:1; background:#eee; border:none; padding:12px; border-radius:8px; cursor:pointer;">ຍົກເລີກ</button>
        </div>
    </div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    async function loadStaff() {
        const { data, error } = await _s.from('staff').select('*').order('role');
        const body = document.getElementById('staff-list-body');
        body.innerHTML = "";

        if(!data || data.length === 0) {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center">ບໍ່ມີຂໍ້ມູນ</td></tr>';
            return;
        }

        data.forEach(person => {
            body.innerHTML += `
                <tr>
                    <td><b>${person.name}</b></td>
                    <td><span class="role-badge role-${person.role}">${person.role}</span></td>
                    <td><span style="letter-spacing:2px; color:#95a5a6;">****</span></td>
                    <td>
                        <button class="btn-action" onclick="resetPin('${person.id}', '${person.name}')">🔑 ຣີເຊັດ PIN</button>
                        <button class="btn-action" style="color:#e74c3c" onclick="deleteStaff('${person.id}', '${person.name}')">🗑️ ລຶບ</button>
                    </td>
                </tr>`;
        });
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }

    async function saveStaff() {
        const name = document.getElementById('staff-name').value;
        const role = document.getElementById('staff-role').value;
        const pin = document.getElementById('staff-pin').value;

        if(!name || !pin) return alert("ກະລຸນາໃສ່ຊື່ ແລະ ລະຫັດ PIN");
        if(pin.length !== 4) return alert("ລະຫັດ PIN ຕ້ອງມີ 4 ຕົວເລກ");

        const { error } = await _s.from('staff').insert([{ name, role, pin }]);
        
        if(!error) {
            alert("ເພີ່ມພະນັກງານໃໝ່ສຳເລັດ!");
            closeStaffModal();
            loadStaff();
        } else {
            alert("ຜິດພາດ: " + error.message);
        }
    }

    async function resetPin(id, name) {
        const newPin = prompt(`ໃສ່ລະຫັດ PIN 4 ຕົວເລກໃໝ່ສຳລັບ ${name}:`);
        if(newPin && newPin.length === 4) {
            const { error } = await _s.from('staff').update({ pin: newPin }).eq('id', id);
            if(!error) alert("ປ່ຽນລະຫັດ PIN ສຳເລັດ.");
            else alert("ຜິດພາດ: " + error.message);
        } else if(newPin) {
            alert("ລະຫັດ PIN ຕ້ອງມີ 4 ຕົວເລກ");
        }
    }

    async function deleteStaff(id, name) {
        if(confirm(`ທ່ານຕ້ອງການລຶບ ${name} ອອກຈາກລະບົບແທ້ບໍ່?`)) {
            const { error } = await _s.from('staff').delete().eq('id', id);
            if(!error) loadStaff();
            else alert("ຜິດພາດ: " + error.message);
        }
    }

    loadStaff();
</script>
</body></html>
