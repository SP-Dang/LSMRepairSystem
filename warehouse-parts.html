<!DOCTYPE html>
<html lang="en"><head><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LSM - WAREHOUSE</title><style>
    body{font-family:'Segoe UI',sans-serif;background:#2c3e50;color:#eee;margin:0;padding:15px}
    .header{background:#1a1a1a;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #f1c40f}
    .request-card{background:#fff;color:#333;border-radius:10px;padding:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border-left:8px solid #f1c40f}
    .part-info b{font-size:18px;display:block;color:#2c3e50}
    .part-info span{font-size:11px;color:#7f8c8d;text-transform:uppercase}
    .btn-issue{background:#27ae60;color:white;border:none;padding:12px 20px;border-radius:6px;font-weight:bold;cursor:pointer}
    .btn-issue:disabled{background:#bdc3c7;cursor:not-allowed}
    .logout-btn{font-size:12px;color:#f1c40f;cursor:pointer;text-decoration:none;border:1px solid #f1c40f;padding:4px 8px;border-radius:4px}
</style></head><body>

<div class="header">
    <div>
        <span style="font-size:10px;color:#888;display:block">WAREHOUSE DUTY</span>
        <b id="user-display">...</b>
    </div>
    <a href="#" class="logout-btn" onclick="logout()">LOGOUT</a>
</div>

<h2 style="font-size:16px;color:#bdc3c7">PENDING PART REQUESTS</h2>
<div id="request-list">Checking for requests...</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    const staffName = localStorage.getItem('lsm_user_name');
    if(!staffName) window.location.href = 'index.html';
    document.getElementById('user-display').innerText = staffName;

    async function loadRequests() {
        const { data, error } = await _s.from('part_requests')
            .select('*, job_cards(vehicle_plate)')
            .eq('status', 'PENDING')
            .order('request_time', { ascending: true });

        const list = document.getElementById('request-list');
        list.innerHTML = "";

        if(!data || data.length === 0) {
            list.innerHTML = "<div style='text-align:center;padding:50px;color:#7f8c8d'>No open requests. 📭</div>";
            return;
        }

        data.forEach(req => {
            const div = document.createElement('div');
            div.className = 'request-card';
            div.innerHTML = `
                <div class="part-info">
                    <span>PLATE: ${req.job_cards?.vehicle_plate || 'N/A'} | REQ BY: ${req.requested_by}</span>
                    <b>[ID: ${req.part_id}] ${req.part_name || 'Part Request'}</b>
                    <span style="color:#2980b9">Qty Requested: ${req.quantity}</span>
                </div>
                <button class="btn-issue" id="btn-${req.id}" onclick="issuePart(${req.id}, '${req.part_id}', ${req.quantity})">ISSUE</button>
            `;
            list.appendChild(div);
        });
    }

    async function issuePart(reqId, partId, qty) {
        const btn = document.getElementById(`btn-${reqId}`);
        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        // 1. Get current stock levels
        const { data: partData } = await _s.from('inventory')
            .select('stock_quantity, part_name')
            .eq('part_id', partId)
            .single();

        if (!partData) {
            alert("Error: Part ID not found in inventory!");
            btn.disabled = false;
            btn.innerText = "ISSUE";
            return;
        }

        if (partData.stock_quantity < qty) {
            alert(`Insufficient Stock! Only ${partData.stock_quantity} left.`);
            btn.disabled = false;
            btn.innerText = "ISSUE";
            return;
        }

        // 2. Update Status and Deduct Stock
        const newStock = partData.stock_quantity - qty;
        
        const { error: updateReq } = await _s.from('part_requests').update({ status: 'ISSUED', issued_by: staffName }).eq('id', reqId);
        const { error: updateInv } = await _s.from('inventory').update({ stock_quantity: newStock }).eq('part_id', partId);

        if(!updateReq && !updateInv) {
            alert(`✅ Issued ${qty}x ${partData.part_name}. New Stock: ${newStock}`);
            loadRequests();
        } else {
            alert("Database Error during issuance.");
            btn.disabled = false;
        }
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    loadRequests();
    setInterval(loadRequests, 10000); // Check every 10 seconds
</script>
</body></html>
