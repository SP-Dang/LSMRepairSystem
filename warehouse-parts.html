<!DOCTYPE html>
<html lang="lo"><head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM - ຄັງເກັບອາໄຫຼ່</title>
    <style>
        body{font-family:'Segoe UI','Phetsarath OT',sans-serif;background:#1a1a1a;color:#eee;margin:0;padding:15px}
        .header{background:#2c3e50;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #f1c40f;flex-wrap:wrap;}
        .group-card{background:#fff;color:#333;border-radius:12px;margin-bottom:20px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
        .group-header{background:#f1c40f;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;font-weight:bold;flex-wrap:wrap;gap:10px}
        .plate-badge{background:#333;color:#f1c40f;padding:4px 10px;border-radius:5px;font-size:18px}
        .part-row{padding:10px 15px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .part-row:last-child{border-bottom:none}
        .part-id{font-size:10px;color:#7f8c8d;display:block}
        .qty-pill{background:#3498db;color:white;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:bold}
        .footer-action{background:#f9f9f9;padding:15px;text-align:right;border-top:2px solid #eee}
        .btn-issue-all{background:#27ae60;color:white;border:none;padding:12px 25px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px}
        .btn-issue-all:disabled{background:#bdc3c7}
        .logout-btn{color:#f1c40f;text-decoration:none;border:1px solid #f1c40f;padding:5px 10px;border-radius:5px;font-size:12px}
        .stock-warning{background:#e74c3c;color:white;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:10px}
        .empty-state{text-align:center;padding:50px;color:#555}
    </style>
</head><body>

<div class="header">
    <div>
        <span style="font-size:10px;color:#bdc3c7;display:block">ພະນັກງານຄັງເກັບ</span>
        <b id="user-display" style="font-size:18px">...</b>
    </div>
    <a href="#" class="logout-btn" onclick="logout()">ອອກຈາກລະບົບ</a>
</div>

<h2 style="font-size:16px;color:#888;margin-bottom:15px">📦 ຄຳຂໍເບີກອາໄຫຼ່ທີ່ລໍຖ້າ</h2>
<div id="batch-list">ກຳລັງໂຫຼດ...</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    const _s = supabase.createClient(u, k);

    const staffName = localStorage.getItem('lsm_user_name');
    if(!staffName) window.location.href = 'index.html';
    document.getElementById('user-display').innerText = staffName;

    async function loadRequests() {
        const { data, error } = await _s.from('part_requests')
            .select('*, job_cards(vehicle_plate)')
            .eq('status', 'PENDING')
            .order('request_time', { ascending: true });

        const list = document.getElementById('batch-list');
        if(!data || data.length === 0) {
            list.innerHTML = "<div class='empty-state'>✅ ບໍ່ມີຄຳຂໍເບີກອາໄຫຼ່ທີ່ລໍຖ້າ</div>";
            return;
        }

        // Group by vehicle plate
        const groups = {};
        data.forEach(req => {
            const plate = req.job_cards?.vehicle_plate || "ບໍ່ລະບຸ";
            if (!groups[plate]) groups[plate] = [];
            groups[plate].push(req);
        });

        list.innerHTML = "";
        for (const plate in groups) {
            const items = groups[plate];
            
            // Check stock availability before showing
            let hasStockIssue = false;
            const stockChecks = [];
            
            for(const item of items) {
                const { data: inv } = await _s.from('inventory')
                    .select('stock_quantity')
                    .eq('part_id', item.part_id)
                    .single();
                const available = inv ? inv.stock_quantity : 0;
                stockChecks.push({ item, available });
                if(available < item.quantity) hasStockIssue = true;
            }
            
            const card = document.createElement('div');
            card.className = 'group-card';
            
            let itemsHtml = '';
            stockChecks.forEach(({item, available}) => {
                const isLow = available < item.quantity;
                itemsHtml += `
                    <div class="part-row">
                        <div>
                            <span class="part-id">ID: ${item.part_id}</span>
                            <b>${item.part_name}</b>
                        </div>
                        <div>
                            <span class="qty-pill">ຂໍ: ${item.quantity}</span>
                            ${isLow ? `<span class="stock-warning">⚠️ ມີແຕ່ ${available}</span>` : `<span style="font-size:11px;color:#27ae60;margin-left:10px">✅ ມີ ${available}</span>`}
                        </div>
                    </div>`;
            });
            
            const btnDisabled = hasStockIssue ? 'disabled' : '';
            const btnText = hasStockIssue ? '⚠️ ສິນຄ້າບໍ່ພຽງພໍ' : '✅ ອະນຸມັດ ແລະ ເບີກຈ່າຍທັງໝົດ';

            card.innerHTML = `
                <div class="group-header">
                    <span>🚗 ທະບຽນ: <span class="plate-badge">${plate}</span></span>
                    <span style="font-size:12px">👤 ຂໍໂດຍ: ${items[0].requested_by}</span>
                </div>
                <div class="items-container">${itemsHtml}</div>
                <div class="footer-action">
                    <button class="btn-issue-all" id="btn-${plate.replace(/[^a-zA-Z0-9]/g, '')}" ${btnDisabled} onclick='issueBatch("${plate}", ${JSON.stringify(items).replace(/"/g, '&quot;')})'>
                        ${btnText}
                    </button>
                </div>
            `;
            list.appendChild(card);
        }
    }

    async function issueBatch(plate, items) {
        const btnId = `btn-${plate.replace(/[^a-zA-Z0-9]/g, '')}`;
        const btn = document.getElementById(btnId);
        if(!btn || btn.disabled) {
            alert("ບໍ່ສາມາດເບີກຈ່າຍໄດ້ ເນື່ອງຈາກສິນຄ້າບໍ່ພຽງພໍ");
            return;
        }
        
        btn.disabled = true;
        btn.innerText = "ກຳລັງອັບເດດສິນຄ້າຄັງ...";

        try {
            for (const item of items) {
                const { data: inv } = await _s.from('inventory')
                    .select('stock_quantity')
                    .eq('part_id', item.part_id)
                    .single();

                if (inv && inv.stock_quantity >= item.quantity) {
                    const newQty = inv.stock_quantity - item.quantity;
                    await _s.from('inventory').update({ stock_quantity: newQty }).eq('part_id', item.part_id);
                    
                    await _s.from('part_requests')
                        .update({ status: 'ISSUED', issued_by: staffName })
                        .eq('id', item.id);
                } else {
                    throw new Error(`ສິນຄ້າ ${item.part_name} ບໍ່ພຽງພໍ`);
                }
            }
            alert(`✅ ເບີກຈ່າຍອາໄຫຼ່ທັງໝົດ ${items.length} ລາຍການສຳເລັດ!`);
            loadRequests();
        } catch (err) {
            alert("ຜິດພາດ: " + err.message);
            btn.disabled = false;
        }
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    loadRequests();
    setInterval(loadRequests, 15000);
</script>
</body></html>
